# This "input" configures a global authorization rule to enable public access to
# all models in this schema. Learn more about authorization rules here: https://docs.amplify.aws/cli/graphql/authorization-rules

type Guardian
  @model
  @auth(
    rules: [
      { allow: private, provider: iam }
      { allow: groups, groups: ["Admin"], operations: [read, update] }
      { allow: owner, operations: [read, create] }
    ]
  ) {
  id: ID!
  name: String!
  familyName: String!
  email: String!
  personalNumber: String
  gender: String
  qualification: String
  phone: String
  professional: Boolean!
  owner: String
  # --- SAYAS Betreuer (THA, § 35a SGB VIII) – additive, alle nullable ---
  # Funktion/Tätigkeit (Schulbegleiter:in, Päd. Fachkraft, Vertretung …)
  jobFunction: String
  # Vergütung/Stundensatz des Betreuers (Personalkosten; kann je Jugendamt
  # auch als Abrechnungssatz herangezogen werden – siehe billingRuleSet).
  hourlyRate: Float
  employmentType: String
  startDate: String
  # Einsatzbereit? Ohne vorgelegtes § 72a-Führungszeugnis = false.
  active: Boolean
  # Erweitertes Führungszeugnis (§ 72a SGB VIII)
  certificateSubmitted: Boolean
  certificateSubmittedDate: String
  certificateRenewalDate: String
  careAssignments: [CareAssignment] @hasMany
  dailyReport: [DailyReport] @hasMany
  timeSheets: [TimeSheets] @hasMany
  invoices: [Invoices] @hasMany
  timeSheetDate: AWSDateTime
  archiveStatus: ArchiveStatus
    @index(name: "listGuardianByState", queryField: "listGuardianByState")
}

type Carrier
  @model
  @auth(
    rules: [
      { allow: private, provider: iam }
      { allow: groups, groups: ["Admin"], operations: [create, read, update] }
    ]
  ) {
  id: ID!
  name: String!
  shortName: String
  street: String!
  addressExtra: String
  houseNumber: String!
  postalCode: String!
  city: String!
  poBox: String
  phone: String
  useBillingAddress: Boolean
  billingName: String
  billingStreet: String
  billingAddressExtra: String
  billingHouseNumber: String
  billingPostalCode: String
  billingCity: String
  billingPoBox: String
  carrierContacts: [CarrierContact] @hasMany
  dailyReports: [DailyReport] @hasMany
  timeSheets: [TimeSheets] @hasMany
  invoices: [Invoices] @hasMany
  email: AWSEmail
  allowAutoInvoice: Boolean
  # --- SAYAS Abrechnung (§ 35a SGB VIII) – additive, alle nullable ---
  # Standard-Stundensatz des Kostenträgers (pro Fallakte überschreibbar).
  defaultHourlyRate: Float
  # Schlüssel des amtsspezifischen Regelsatzes (Soll-Berechnung, Krankheit,
  # Stundenpool). Default-Regeln, bis Detailregeln nachgeliefert werden.
  billingRuleSet: String
}

type CarrierContact
  @model
  @auth(
    rules: [
      { allow: private, provider: iam }
      { allow: groups, groups: ["Admin"], operations: [create, read, update] }
    ]
  ) {
  id: ID!
  name: String
  familyName: String
  phone: String
  email: AWSEmail
  children: [Child] @hasMany
  carrier: Carrier @belongsTo
}

type Child
  @model
  @auth(
    rules: [
      { allow: private, provider: iam }
      { allow: groups, groups: ["Admin"], operations: [create, read, update] }
      { allow: groups, groups: ["Guardian"], operations: [read] }
    ]
  ) {
  id: ID!
  name: String!
  familyName: String!
  dateOfBirth: String!
  dateOfRegistration: String!
  weeklyHours: Float
  weeklyHoursByPlan: Boolean
  recordNumber: String
  dataComplete: Boolean
  carrierContact: CarrierContact @belongsTo
  careAssignments: [CareAssignment] @hasMany
  dailyReport: [DailyReport] @hasMany
  timeSheets: [TimeSheets] @hasMany
  invoices: [Invoices] @hasMany
  school: String!
  schoolLocation: String
  mother: Parent
  father: Parent
  schoolContact: SchoolContact
  # --- SAYAS Fallakte (§ 35a SGB VIII) – additive, alle nullable ---
  # Stammdaten
  gender: String
  address: String
  nativeLanguage: String
  # Schule & Begleitung
  schoolForm: String
  schoolClass: String
  supportNeed: String
  # Hilfe & Abrechnung (§ 35a SGB VIII)
  legalBasis: String
  caseworker: String
  decisionRef: String
  approvedUntil: String
  # Stundensatz aus Bescheid/Vereinbarung (Default kommt sonst vom Träger).
  hourlyRate: Float
  # Datenschutz / Einwilligung
  consentGiven: Boolean
  consentDate: String
  # Dynamische Liste aller Sorgeberechtigten (über Mutter/Vater hinaus)
  legalGuardians: [Parent]
  archiveStatus: ArchiveStatus
    @index(
      name: "listChildrenByArchiveState"
      queryField: "listChildrenByArchiveState"
    )
}

type CareAssignment
  @model
  @auth(
    rules: [
      { allow: private, provider: iam }
      { allow: groups, groups: ["Admin"] }
    ]
  ) {
  id: ID!
  guardian: Guardian @belongsTo
  guardianCareAssignmentsId: String
    @index(
      name: "careAssignmentsByGuardian"
      queryField: "careAssignmentsByGuardian"
    )
  child: Child @belongsTo
  childCareAssignmentsId: String
    @index(name: "careAssignmentsByChild", queryField: "careAssignmentsByChild")
}

type DailyReport
  @model
  @auth(
    rules: [
      { allow: private, provider: iam }
      { allow: groups, groups: ["Admin"] }
      { allow: owner, ownerField: "owner", operations: [read] }
    ]
  ) {
  id: ID!
  key: String
  child: Child @belongsTo
  childDailyReportId: String
    @index(
      name: "reportsByChild"
      queryField: "reportsByChild"
      sortKeyFields: ["documentStatus"]
    )
  guardian: Guardian @belongsTo
  guardianDailyReportId: String
  carrier: Carrier @belongsTo
  timeSheets: TimeSheets @belongsTo
  invoices: Invoices @belongsTo
  documentDate: AWSDateTime!
  documentEndDate: AWSDateTime
  documentStatus: DocumentStatus
    @index(
      name: "reportsByDocumentStatus"
      queryField: "reportsByDocumentStatus"
      sortKeyFields: ["guardianDailyReportId"]
    )
  hourFrom: Int!
  hourTo: Int!
  minuteFrom: Int!
  minuteTo: Int!
  sick: Boolean
  sickOnTime: Boolean
  substitute: Boolean
  homework: AWSJSON
  report: String
  exchange: String
  parentreport: String
  mood: Mood
  reportActivity: ReportActivity
  flag: ReportFlag
    @index(
      name: "dailyReportsByFlagStatus"
      queryField: "dailyReportsByFlagStatus"
      sortKeyFields: ["guardianDailyReportId"]
    )
  flagText: String
  flagDaySelection: Boolean
  retrospectively: Boolean
  reviseDate: AWSDateTime
  createdAt: AWSDateTime!
  owner: String
  reportType: ReportType
    @index(
      name: "dailyReportsByReportType"
      queryField: "dailyReportsByReportType"
      sortKeyFields: ["guardianDailyReportId"]
    )
  type: String!
    @index(
      name: "dailyReportsByType"
      queryField: "dailyReportsByType"
      sortKeyFields: ["documentDate"]
    )
}

type TimeSheets
  @model
  @auth(
    rules: [
      { allow: private, provider: iam }
      { allow: groups, groups: ["Admin"] }
      { allow: owner, ownerField: "owner", operations: [read] }
    ]
  ) {
  id: ID!
  key: String
  child: Child @belongsTo
  guardian: Guardian @belongsTo
  guardianTimeSheetsId: String
    @index(
      name: "timeSheetsByGuardian"
      queryField: "timeSheetsByGuardian"
      sortKeyFields: ["documentDate"]
    )
  carrier: Carrier @belongsTo
  dailyReport: [DailyReport] @hasMany
  documentDate: AWSDateTime!
  transmitted: Boolean
  charged: Boolean
  # SAYAS: Unterschriften-Ampel + ggf. Überhang-Korrektur dieses Nachweises.
  signatures: SignatureSet
  overhangCorrection: OverhangCorrection
  reportType: ReportType
  flag: TimSheetFlag
    @index(
      name: "timeSheetsByFlagStatus"
      queryField: "timeSheetsByFlagStatus"
      sortKeyFields: ["guardianTimeSheetsId"]
    )
  reviseDate: AWSDateTime
  createdAt: AWSDateTime!
  owner: String
  type: String!
    @index(
      name: "timeSheetsByType"
      queryField: "timeSheetsByType"
      sortKeyFields: ["documentDate"]
    )
}

type Invoices
  @model
  @auth(
    rules: [
      { allow: private, provider: iam }
      { allow: groups, groups: ["Admin"] }
    ]
  ) {
  id: ID!
  key: String
  internalNumber: String
  child: Child @belongsTo
  guardian: Guardian @belongsTo
  carrier: Carrier @belongsTo
  dailyReport: [DailyReport] @hasMany
  documentDate: AWSDateTime!
  # overwriteHours: Float
  # overwriteSickHours: Float
  transmitted: Boolean
  charged: Boolean
  # SAYAS: abgerechnete Stunden, Betrag und Überhang-Korrektur (Rechnungskorrektur).
  billableHours: Float
  amount: Float
  overhangCorrection: OverhangCorrection
  reviseDate: AWSDateTime
  createdAt: AWSDateTime!
  type: String!
    @index(
      name: "invoicesByType"
      queryField: "invoicesByType"
      sortKeyFields: ["documentDate"]
    )
}

type InvoiceNumber @model @auth(rules: [{ allow: private, provider: iam }]) {
  id: ID!
  year: Int!
    @index(name: "invoiceNumberByYear", queryField: "invoiceNumberByYear")
  number: Int!
}

type Calendar
  @model
  @auth(
    rules: [
      { allow: private, provider: iam }
      { allow: groups, groups: ["Admin"] }
    ]
  ) {
  id: ID!
  title: String
  description: String
  color: String
  events: [Event] @hasMany
  participations: [Participation] @hasMany
}

type Event
  @model
  @auth(
    rules: [
      { allow: private, provider: iam }
      { allow: groups, groups: ["Admin"] }
    ]
  ) {
  id: ID!
  title: String
  description: String
  link: String
  calendarEventsId: ID
    @index(
      name: "eventsByCalendar"
      queryField: "eventsByCalendar"
      sortKeyFields: ["startDate"]
    )
  startDate: AWSDateTime
  durationInHours: Float
  active: EventStatus
    @index(
      name: "eventsByActive"
      queryField: "eventsByActive"
      sortKeyFields: ["startDate"]
    )
  calendar: Calendar @belongsTo
}

type Participation
  @model
  @auth(
    rules: [
      { allow: private, provider: iam }
      { allow: groups, groups: ["Admin"] }
    ]
  ) {
  id: ID!
  participant: ID
    @index(
      name: "participationByParticipant"
      queryField: "participationByParticipant"
    )
  type: ParticipantType
  calendarParticipationsId: ID
    @index(
      name: "participationByCalendar"
      queryField: "participationByCalendar"
    )
  calendar: Calendar @belongsTo
}

type Note
  @model
  @auth(
    rules: [
      { allow: private, provider: iam }
      { allow: groups, groups: ["Admin"], operations: [create, read] }
      {
        allow: owner
        ownerField: "owner"
        operations: [create, read, update, delete]
      }
    ]
  ) {
  id: ID!
  title: String
  description: String
  owner: ID
  status: NoteStatus
    @index(
      name: "notesByStatus"
      queryField: "notesByStatus"
      sortKeyFields: ["createdAt"]
    )
  noteTags: [NoteTag] @hasMany
  createdAt: AWSDateTime
}

type NoteTag
  @model
  @auth(
    rules: [
      { allow: private, provider: iam }
      { allow: groups, groups: ["Admin"], operations: [read, delete] }
      { allow: owner, ownerField: "owner", operations: [update] }
    ]
  ) {
  id: ID!
  owner: ID
  status: NoteTagStatus
    @index(
      name: "noteTagsByStatus"
      queryField: "noteTagsByStatus"
      sortKeyFields: ["owner"]
    )
  note: Note @belongsTo
  noteNoteTagsId: String
    @index(name: "noteTagsByNote", queryField: "noteTagsByNote")
}

enum Mood {
  happy
  neutral
  sad
  sick
}

enum DocumentStatus {
  created
  charged
  transmitted
}

enum ReportActivity {
  school
  helpPlanDiscussion
  getToKnowInterview
  hospitation
  excursion
  holiday
  vacation
  employeeSickness
  other
  supervision
  teamMeeting
  miscellaneous
}

enum ReportType {
  standard
  special
}

enum ReportFlag {
  revise
}

enum TimSheetFlag {
  revise
}

enum ParticipantType {
  admin
  guardian
}

enum EventStatus {
  active
  canceled
}

enum NoteStatus {
  created
  done
}

enum NoteTagStatus {
  new
  read
}

enum ArchiveStatus {
  archived
  unarchived
}

type Parent {
  name: String
  familyName: String
  phone: String
  email: AWSEmail
  primaryContact: Boolean
  # SAYAS: Rolle (Mutter, Vater, Vormund, Pflegeeltern, Amtsvormund, sonstige)
  role: String
  # SAYAS: personensorgeberechtigt
  custody: Boolean
}

type SchoolContact {
  name: String
  familyName: String
  phone: String
  email: AWSEmail
  function: String
  gender: String
}

# SAYAS: Unterschriften-Ampel eines Nachweises (Eltern/Schule/Fachkraft).
# Eine fehlende Unterschrift blockiert den Status "abrechenbar".
type SignatureSet {
  parent: Boolean
  parentAt: AWSDateTime
  school: Boolean
  schoolAt: AWSDateTime
  professional: Boolean
  professionalAt: AWSDateTime
}

# SAYAS: Überhang-Korrektur mit Protokoll (wer, wann, warum).
# mode: cap (deckeln) | release (freigeben) | carryover (in Folgemonat).
type OverhangCorrection {
  mode: String
  releasedHours: Float
  reason: String
  correctedBy: String
  correctedAt: AWSDateTime
}

